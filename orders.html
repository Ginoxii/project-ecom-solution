<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commandes — EcomSolutions</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
<div class="app-layout">
  <div class="main-content" id="mainContent">
    <div id="topbarContainer"></div>
    <div class="page-content">

      <!-- FILTRES & STATS -->
      <div class="grid-4" style="gap:16px;margin-bottom:28px;" id="orderStats"></div>

      <!-- FILTRES -->
      <div class="card" style="margin-bottom:20px;">
        <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;">
          <input type="text" class="form-control" placeholder="🔍 Rechercher commande..."
            id="searchOrder" oninput="filterOrders()" style="flex:1;min-width:200px;">
          <select class="form-control" id="filterStatus" onchange="filterOrders()" style="width:180px;">
            <option value="">Tous les statuts</option>
            <option value="livré">✅ Livré</option>
            <option value="expédié">📬 Expédié</option>
            <option value="en attente">⏳ En attente</option>
            <option value="litige">⚠️ Litige</option>
            <option value="remboursé">↩️ Remboursé</option>
          </select>
          <select class="form-control" id="filterDate" onchange="filterOrders()" style="width:160px;">
            <option value="">Toute période</option>
            <option value="today">Aujourd'hui</option>
            <option value="week">Cette semaine</option>
            <option value="month">Ce mois</option>
          </select>
          <button class="btn btn-primary" onclick="exportOrders()">📥 Exporter CSV</button>
          <button class="btn btn-secondary" onclick="openNewOrder()">➕ Nouvelle</button>
        </div>
      </div>

      <!-- TABLE -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">📦 Toutes les commandes</span>
          <span class="badge badge-blue" id="orderCount">0 commandes</span>
        </div>
        <div class="table-container" id="ordersTable"></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL DETAIL -->
<div class="modal-overlay" id="orderModal" onclick="closeModal('orderModal')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle">Détail commande</h3>
      <button class="modal-close" onclick="closeModal('orderModal')">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('orderModal')">Fermer</button>
      <button class="btn btn-primary" onclick="updateOrderStatus()">💾 Mettre à jour</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/orders.js"></script>
</body>
</html>
